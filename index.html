    <div class="center-panel">
      <div class="profile-ring-wrapper" id="profileWrapper">
        <div class="ring ring-outer"></div>
        <div class="ring ring-mid"></div>
        <div class="profile-circle">
          
          <img src="images/กูอ้วน.jpg" alt="Profile" id="profileImg" onerror="this.style.display='none'; document.getElementById('initials').style.display='flex'"/>
          <div class="initials" id="initials">YN</div>
        </div>
        <div class="status-dot"></div>
      </div>

      
      <div class="music-player">
        <div class="music-info">
          <span class="music-icon">♪</span>
          <div class="music-text">
            <span class="song-title" id="songTitle">คนนี้ คนนี้</span>
            <span class="song-artist" id="songArtist">ศิลปิน ต๊อด พงษ์ศักดิ์ แซ่เซอ</span>
          </div>
        </div>
        <div class="music-controls">
          <button class="play-btn" id="playBtn" onclick="toggleMusic()">▶</button>
        </div>
        <audio id="bgMusic" loop>
          
          <source src="images/PAP BEAT BAND -  Official Music Video.mp3" type="audio/mpeg"/>
        </audio>
        <div class="equalizer" id="equalizer">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
      </div>
    </div>

    
    <aside class="right-panel">
      <div class="stats-block">
        <div class="stat-item">
          <span class="stat-num" data-target="7">0</span>
          <span class="stat-label">Projects</span>
        </div>
        <div class="stat-item">
          <span class="stat-num" data-target="0">0</span>
          <span class="stat-label">Hours Coded</span>
        </div>
        <div class="stat-item">
          <span class="stat-num" data-target="51">0</span>
          <span class="stat-label">Games Played</span>
        </div>
      </div>

      <div class="interests">
        <h3>ความสนใจ</h3>
        <div class="tags">
          <span class="tag">🎮 Gaming</span>
          <span class="tag">💻 Coding</span>
          <span class="tag">🎵 Music</span>
          <span class="tag">📚 Reading</span>
        </div>
      </div>

      <div class="currently">
        <h3>ตอนนี้กำลัง...</h3>
        <ul>
          <li>🎮 เล่น — Dying Light 2  </li>
          <li>📖 อ่าน — ชช/ญญ</li>
